<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Form Validation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="success-toast" class="toast" aria-live="polite">
        <i class="fa-solid fa-circle-check"></i>
        <span>Registration successful!</span>
    </div>

    <main class="container">
        <div class="form-card">
            <div class="form-header">
                <h2>Create an Account</h2>
                <p>Join us today to get started.</p>
            </div>

            <form id="registration-form" novalidate>
                
                <div class="form-control">
                    <label for="fullname">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="fullname" name="fullname" placeholder="John Doe" autocomplete="name">
                    </div>
                    <small class="error-message" aria-live="assertive"></small>
                </div>

                <div class="form-control">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="user@example.com" autocomplete="email">
                    </div>
                    <small class="error-message" aria-live="assertive"></small>
                </div>

                <div class="form-control">
                    <label for="phone">Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="phone" name="phone" placeholder="+251912345678" autocomplete="tel">
                    </div>
                    <small class="error-message" aria-live="assertive"></small>
                </div>

                <div class="form-control">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Create a password">
                    </div>
                    <small class="error-message" aria-live="assertive"></small>
                    
                    <div class="strength-meter">
                        <div class="meter-bar" id="meter-1"></div>
                        <div class="meter-bar" id="meter-2"></div>
                        <div class="meter-bar" id="meter-3"></div>
                    </div>
                    <small id="strength-text" class="strength-text"></small>
                </div>

                <div class="form-control">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-check"></i>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password">
                    </div>
                    <small class="error-message" aria-live="assertive"></small>
                </div>

                <button type="submit" class="btn-submit">Sign Up</button>
            </form>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
